<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Getsu">
  <title>Getsu</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#241d46"/><stop offset="0.55" stop-color="#312356"/><stop offset="1" stop-color="#432c66"/></linearGradient>
    <linearGradient id="moon" x1="0.15" y1="0.1" x2="0.9" y2="1"><stop offset="0" stop-color="#fff6dc"/><stop offset="0.5" stop-color="#ffe4a0"/><stop offset="1" stop-color="#f6c452"/></linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#ffe6a6" stop-opacity="0.9"/><stop offset="0.45" stop-color="#ffcf6b" stop-opacity="0.35"/><stop offset="1" stop-color="#ffcf6b" stop-opacity="0"/></radialGradient>
    <radialGradient id="eye" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#fff2c4"/><stop offset="0.6" stop-color="#f7c94e"/><stop offset="1" stop-color="#e9a52f"/></radialGradient>
